server:
  port: 8080
  servlet:
    context-path: /demo

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springmvctest
    username: root
    password: 123456

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

# MyBatis配置
mybatis:
  # mapper xml文件位置
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.demo.entity

  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

logging:
  level:
    com.demo.mapper: debug